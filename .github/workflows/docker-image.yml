name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: true
        description: The tag to add to the image
        
      tag-latest:
        type: boolean
        default: true
        description: Whether to tag the image 'latest'

jobs:
  build:
    permissions:
      packages: write

    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v4.0.0
      with:
        name: multiarch
        platforms: linux/amd64,linux/arm64      
        
    - name: Login to Docker Hub
      # if: github.event_name != 'pull_request'
      uses: docker/login-action@v4.0.0
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}  
        

    - name: Login to GHCR
      # if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker images
      uses: docker/build-push-action@v7.0.0
      with:
        context: .
        file: time-api/Dockerfile.default
        labels: |
          EXAMPLE=HelloWorld
        platforms: |
          linux/arm64
          linux/amd64
        # pull: # optional, default is false
        push: true
        tags: |
          ${{ vars.DOCKER_REPO }}:dev-default-latest
          ${{ vars.DOCKER_REPO }}:dev-latest
          ghcr.io/dekoeky/time-api:dev-default-latest
          ghcr.io/dekoeky/time-api:dev-latest
    
    - name: Update Docker Hub Description
      uses: peter-evans/dockerhub-description@v4.0.0
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        repository: ${{ vars.DOCKER_REPO }}
        readme-filepath: DockerHub.Description.md